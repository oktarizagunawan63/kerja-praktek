<!DOCTYPE html>
<html>
<head>
    <title>Test Location API</title>
</head>
<body>
    <h1>Test Location API</h1>
    
    <div>
        <h3>Test Locations API</h3>
        <button onclick="testLocations()">Get All Locations</button>
        <button onclick="testLocationSearch()">Search "Jakarta"</button>
        <button onclick="testLocationsByProvince()">Filter by "Jawa Barat"</button>
    </div>
    
    <div>
        <h3>Test Provinces API</h3>
        <button onclick="testProvinces()">Get All Provinces</button>
    </div>
    
    <div id="result"></div>

    <script>
        const API_BASE = 'http://127.0.0.1:8000/api';
        
        async function testLocations() {
            try {
                const response = await fetch(`${API_BASE}/locations`, {
                    headers: {
                        'Accept': 'application/json'
                    }
                });
                
                const data = await response.json();
                document.getElementById('result').innerHTML = `
                    <h3>All Locations:</h3>
                    <pre>${JSON.stringify(data, null, 2)}</pre>
                `;
            } catch (error) {
                document.getElementById('result').innerHTML = `
                    <h3>Error:</h3>
                    <pre>${error.message}</pre>
                `;
            }
        }
        
        async function testLocationSearch() {
            try {
                const response = await fetch(`${API_BASE}/locations?search=Jakarta`, {
                    headers: {
                        'Accept': 'application/json'
                    }
                });
                
                const data = await response.json();
                document.getElementById('result').innerHTML = `
                    <h3>Search "Jakarta":</h3>
                    <pre>${JSON.stringify(data, null, 2)}</pre>
                `;
            } catch (error) {
                document.getElementById('result').innerHTML = `
                    <h3>Error:</h3>
                    <pre>${error.message}</pre>
                `;
            }
        }
        
        async function testLocationsByProvince() {
            try {
                const response = await fetch(`${API_BASE}/locations?province=Jawa Barat`, {
                    headers: {
                        'Accept': 'application/json'
                    }
                });
                
                const data = await response.json();
                document.getElementById('result').innerHTML = `
                    <h3>Filter by "Jawa Barat":</h3>
                    <pre>${JSON.stringify(data, null, 2)}</pre>
                `;
            } catch (error) {
                document.getElementById('result').innerHTML = `
                    <h3>Error:</h3>
                    <pre>${error.message}</pre>
                `;
            }
        }
        
        async function testProvinces() {
            try {
                const response = await fetch(`${API_BASE}/locations/provinces`, {
                    headers: {
                        'Accept': 'application/json'
                    }
                });
                
                const data = await response.json();
                document.getElementById('result').innerHTML = `
                    <h3>All Provinces:</h3>
                    <pre>${JSON.stringify(data, null, 2)}</pre>
                `;
            } catch (error) {
                document.getElementById('result').innerHTML = `
                    <h3>Error:</h3>
                    <pre>${error.message}</pre>
                `;
            }
        }
    </script>
</body>
</html>
