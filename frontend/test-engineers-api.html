<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Engineers API</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        .result { background: #f5f5f5; padding: 15px; border-radius: 5px; margin: 10px 0; }
        .success { background: #d4edda; border: 1px solid #c3e6cb; color: #155724; }
        .error { background: #f8d7da; border: 1px solid #f5c6cb; color: #721c24; }
        .engineer-card { 
            border: 1px solid #ddd; 
            padding: 10px; 
            margin: 5px 0; 
            border-radius: 5px; 
            background: white;
        }
        button { 
            background: #007bff; 
            color: white; 
            border: none; 
            padding: 10px 20px; 
            border-radius: 5px; 
            cursor: pointer; 
            margin: 5px;
        }
        button:hover { background: #0056b3; }
        .loading { color: #666; font-style: italic; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔧 Engineers API Test</h1>
        <p>This page tests the <code>/api/engineers</code> endpoint to verify the engineer selection modal bug fix.</p>
        
        <div>
            <button onclick="testEngineersAPI()">Test /api/engineers</button>
            <button onclick="testWithAuth()">Test with Auth Token</button>
            <button onclick="clearResults()">Clear Results</button>
        </div>
        
        <div id="results"></div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8000/api';
        
        function log(message, type = 'info') {
            const results = document.getElementById('results');
            const div = document.createElement('div');
            div.className = `result ${type}`;
            div.innerHTML = `<strong>${new Date().toLocaleTimeString()}</strong>: ${message}`;
            results.appendChild(div);
            results.scrollTop = results.scrollHeight;
        }
        
        function clearResults() {
            document.getElementById('results').innerHTML = '';
        }
        
        async function testEngineersAPI() {
            log('🔍 Testing /api/engineers endpoint...', 'info');
            
            try {
                const response = await fetch(`${API_BASE}/engineers`, {
                    method: 'GET',
                    headers: {
                        'Accept': 'application/json',
                        'Content-Type': 'application/json'
                    }
                });
                
                log(`📡 Response Status: ${response.status} ${response.statusText}`, 
                    response.ok ? 'success' : 'error');
                
                if (!response.ok) {
                    const errorText = await response.text();
                    log(`❌ Error Response: ${errorText}`, 'error');
                    return;
                }
                
                const data = await response.json();
                log(`✅ Response received: ${JSON.stringify(data, null, 2)}`, 'success');
                
                if (Array.isArray(data)) {
                    log(`👥 Found ${data.length} engineers:`, 'success');
                    data.forEach(engineer => {
                        log(`
                            <div class="engineer-card">
                                <strong>ID:</strong> ${engineer.id}<br>
                                <strong>Name:</strong> ${engineer.name}<br>
                                <strong>Email:</strong> ${engineer.email}<br>
                                <strong>Role:</strong> ${engineer.role}
                            </div>
                        `, 'success');
                    });
                } else {
                    log(`⚠️ Response is not an array: ${typeof data}`, 'error');
                }
                
            } catch (error) {
                log(`❌ Network Error: ${error.message}`, 'error');
                log('💡 Make sure Laravel backend is running on localhost:8000', 'info');
            }
        }
        
        async function testWithAuth() {
            log('🔐 Testing /api/engineers with authentication...', 'info');
            
            // Try to get token from localStorage (if user is logged in)
            let token = null;
            try {
                const auth = JSON.parse(localStorage.getItem('amsar-auth') || '{}');
                token = auth?.state?.token || auth?.token;
            } catch (e) {
                log('⚠️ No auth token found in localStorage', 'info');
            }
            
            if (!token) {
                log('❌ No authentication token available. Please login first.', 'error');
                return;
            }
            
            log(`🔑 Using token: ${token.substring(0, 20)}...`, 'info');
            
            try {
                const response = await fetch(`${API_BASE}/engineers`, {
                    method: 'GET',
                    headers: {
                        'Accept': 'application/json',
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    }
                });
                
                log(`📡 Authenticated Response Status: ${response.status} ${response.statusText}`, 
                    response.ok ? 'success' : 'error');
                
                if (!response.ok) {
                    const errorText = await response.text();
                    log(`❌ Auth Error Response: ${errorText}`, 'error');
                    return;
                }
                
                const data = await response.json();
                log(`✅ Authenticated Response: ${JSON.stringify(data, null, 2)}`, 'success');
                
                if (Array.isArray(data)) {
                    log(`👥 Authenticated request found ${data.length} engineers`, 'success');
                } else {
                    log(`⚠️ Authenticated response is not an array: ${typeof data}`, 'error');
                }
                
            } catch (error) {
                log(`❌ Authenticated Network Error: ${error.message}`, 'error');
            }
        }
        
        // Auto-run test on page load
        window.onload = function() {
            log('🚀 Engineers API Test Page Loaded', 'info');
            log('Click "Test /api/engineers" to test the endpoint', 'info');
        };
    </script>
</body>
</html>
