<!DOCTYPE html>
<html>
<head>
    <title>Debug Authentication</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        .result { background: #f5f5f5; padding: 15px; border-radius: 5px; margin: 10px 0; }
        .error { background: #ffebee; color: #c62828; }
        .success { background: #e8f5e8; color: #2e7d32; }
        button { padding: 10px 20px; margin: 5px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 Debug Authentication Issue</h1>
        
        <button onclick="checkAuth()">Check Auth Status</button>
        <button onclick="testDeleteAPI()">Test Delete API</button>
        <button onclick="clearAuth()">Clear Auth</button>
        
        <div id="results"></div>
    </div>

    <script>
        function log(message, type = 'info') {
            const div = document.createElement('div');
            div.className = `result ${type}`;
            div.innerHTML = `<strong>${new Date().toLocaleTimeString()}:</strong> ${message}`;
            document.getElementById('results').appendChild(div);
        }

        function checkAuth() {
            try {
                const authData = localStorage.getItem('amsar-auth');
                log(`Raw auth data: ${authData}`);
                
                if (authData) {
                    const parsed = JSON.parse(authData);
                    log(`Parsed auth: ${JSON.stringify(parsed, null, 2)}`);
                    
                    const token = parsed?.state?.token || parsed?.token;
                    log(`Extracted token: ${token ? 'EXISTS' : 'NOT FOUND'}`);
                    
                    if (token) {
                        log(`Token preview: ${token.substring(0, 20)}...`, 'success');
                    }
                } else {
                    log('No auth data found in localStorage', 'error');
                }
            } catch (error) {
                log(`Error checking auth: ${error.message}`, 'error');
            }
        }

        async function testDeleteAPI() {
            try {
                const authData = JSON.parse(localStorage.getItem('amsar-auth') || '{}');
                const token = authData?.state?.token || authData?.token;
                
                if (!token) {
                    log('No token found - cannot test API', 'error');
                    return;
                }
                
                log('Testing delete API with token...');
                
                const response = await fetch('http://localhost:8000/api/projects/999', {
                    method: 'DELETE',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Accept': 'application/json',
                        'Content-Type': 'application/json'
                    }
                });
                
                log(`Response status: ${response.status}`);
                
                const responseText = await response.text();
                log(`Response body: ${responseText}`);
                
                if (response.status === 401) {
                    log('Authentication failed - token might be expired', 'error');
                } else if (response.status === 404) {
                    log('Project not found (expected for ID 999)', 'success');
                } else if (response.status === 200) {
                    log('Delete successful', 'success');
                } else {
                    log(`Unexpected status: ${response.status}`, 'error');
                }
                
            } catch (error) {
                log(`API test error: ${error.message}`, 'error');
            }
        }

        function clearAuth() {
            localStorage.removeItem('amsar-auth');
            log('Auth data cleared', 'success');
        }

        // Auto-check on load
        setTimeout(checkAuth, 500);
    </script>
</body>
</html>
