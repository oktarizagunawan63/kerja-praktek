<!DOCTYPE html>
<html>
<head>
    <title>Test Auth CORS</title>
</head>
<body>
    <h1>Test Authentication CORS</h1>
    <button onclick="testLogin()">Test Login</button>
    <button onclick="testMe()">Test Me (with token)</button>
    <div id="result"></div>

    <script>
        const API_BASE = 'http://127.0.0.1:8000/api';
        
        async function testLogin() {
            try {
                console.log('Testing login...');
                const response = await fetch(`${API_BASE}/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify({
                        email: 'direktur@ptamsar.co.id',
                        password: 'password'
                    })
                });
                
                console.log('Response status:', response.status);
                console.log('Response headers:', response.headers);
                
                const data = await response.json();
                console.log('Response data:', data);
                console.log('User role:', data.user?.role);
                
                document.getElementById('result').innerHTML = `
                    <h3>Login Result:</h3>
                    <pre>${JSON.stringify(data, null, 2)}</pre>
                    <h4>User Role: ${data.user?.role || 'UNDEFINED'}</h4>
                `;
                
                if (data.token) {
                    localStorage.setItem('test_token', data.token);
                    // Also store in the same format as the app
                    localStorage.setItem('amsar-auth', JSON.stringify({
                        state: {
                            token: data.token,
                            user: data.user
                        }
                    }));
                }
            } catch (error) {
                console.error('Login error:', error);
                document.getElementById('result').innerHTML = `
                    <h3>Login Error:</h3>
                    <pre>${error.message}</pre>
                `;
            }
        }
        
        async function testMe() {
            const token = localStorage.getItem('test_token');
            if (!token) {
                alert('Please login first');
                return;
            }
            
            try {
                const response = await fetch(`${API_BASE}/auth/me`, {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Accept': 'application/json'
                    }
                });
                
                const data = await response.json();
                document.getElementById('result').innerHTML = `
                    <h3>Me Result:</h3>
                    <pre>${JSON.stringify(data, null, 2)}</pre>
                `;
            } catch (error) {
                document.getElementById('result').innerHTML = `
                    <h3>Me Error:</h3>
                    <pre>${error.message}</pre>
                `;
            }
        }
    </script>
</body>
</html>
