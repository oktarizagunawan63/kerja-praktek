<!DOCTYPE html>
<html>
<head>
    <title>Test Notifications & Activity Log</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .section { margin: 20px 0; padding: 15px; border: 1px solid #ddd; border-radius: 8px; }
        button { margin: 5px; padding: 8px 16px; background: #0f4c81; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #1a6bb5; }
        .result { margin-top: 10px; padding: 10px; background: #f5f5f5; border-radius: 4px; max-height: 300px; overflow-y: auto; }
        pre { white-space: pre-wrap; font-size: 12px; }
    </style>
</head>
<body>
    <h1>Test Notifications & Activity Log</h1>
    
    <div class="section">
        <h3>Test Project Operations</h3>
        <button onclick="testAddProject()">Add Project</button>
        <button onclick="testUpdateProject()">Update Project</button>
        <button onclick="testCompleteProject()">Complete Project</button>
        <button onclick="testDeleteProject()">Delete Project</button>
    </div>
    
    <div class="section">
        <h3>Test Material Operations</h3>
        <button onclick="testAddMaterial()">Add Material</button>
        <button onclick="testUpdateMaterial()">Update Material</button>
        <button onclick="testDeleteMaterial()">Delete Material</button>
    </div>
    
    <div class="section">
        <h3>Test Document Operations</h3>
        <button onclick="testAddDocument()">Add Document</button>
        <button onclick="testDeleteDocument()">Delete Document</button>
    </div>
    
    <div class="section">
        <h3>Check Results</h3>
        <button onclick="checkNotifications()">Check Notifications</button>
        <button onclick="checkActivityLog()">Check Activity Log</button>
        <button onclick="clearAll()">Clear All Data</button>
    </div>
    
    <div id="result" class="result"></div>

    <script>
        // Mock appStore functions
        let mockStore = {
            projects: [],
            materials: {},
            documents: [],
            notifications: [],
            activities: []
        };

        function addProject(project) {
            const newId = Date.now();
            const newProject = { ...project, id: newId, progress: 0, realisasi: 0 };
            mockStore.projects.push(newProject);
            
            // Add activity log
            addActivity({ 
                action: 'Proyek Dibuat', 
                detail: `Proyek baru "${project.name}" di ${project.location} — PM: ${project.pm}`, 
                projectId: newId 
            });
            
            // Add notification
            addNotif({
                type: 'success',
                title: 'Proyek Baru Dibuat ✓',
                message: `${project.name} (${project.location}) telah ditambahkan ke sistem`,
                projectId: newId,
            });
            
            return newId;
        }

        function addActivity({ action, detail, projectId }) {
            const entry = {
                id: Date.now(),
                user: 'Test User',
                role: 'direktur',
                action,
                detail,
                project: mockStore.projects.find(p => p.id === projectId)?.name || '-',
                time: new Date().toLocaleString('id-ID'),
            };
            mockStore.activities.unshift(entry);
        }

        function addNotif(notif) {
            mockStore.notifications.unshift({ 
                ...notif, 
                id: Date.now(), 
                isRead: false, 
                createdAt: new Date().toISOString() 
            });
        }

        function testAddProject() {
            const projectId = addProject({
                name: 'RS Test Jakarta',
                location: 'Jakarta Selatan',
                pm: 'Budi Santoso',
                deadline: '2026-12-31',
                rab: 5000000
            });
            showResult('Project added with ID: ' + projectId);
        }

        function testUpdateProject() {
            if (mockStore.projects.length === 0) {
                showResult('No projects to update. Add a project first.');
                return;
            }
            
            const project = mockStore.projects[0];
            addActivity({ 
                action: 'Proyek Diupdate', 
                detail: `Update ${project.name} — Status: completed`, 
                projectId: project.id 
            });
            showResult('Project updated');
        }

        function testCompleteProject() {
            if (mockStore.projects.length === 0) {
                showResult('No projects to complete. Add a project first.');
                return;
            }
            
            const project = mockStore.projects[0];
            project.status = 'completed';
            project.progress = 100;
            
            addActivity({ 
                action: 'Proyek Selesai', 
                detail: `Proyek ditandai selesai`, 
                projectId: project.id 
            });
            
            addNotif({
                type: 'success',
                title: 'Proyek Selesai ✓',
                message: `${project.name} (${project.location}) telah ditandai selesai`,
                projectId: project.id,
            });
            
            showResult('Project completed');
        }

        function testDeleteProject() {
            if (mockStore.projects.length === 0) {
                showResult('No projects to delete. Add a project first.');
                return;
            }
            
            const project = mockStore.projects[0];
            addActivity({ 
                action: 'Proyek Dihapus', 
                detail: `${project.name} (${project.location}) dipindahkan ke sampah`, 
                projectId: project.id 
            });
            showResult('Project deleted');
        }

        function testAddMaterial() {
            if (mockStore.projects.length === 0) {
                showResult('No projects available. Add a project first.');
                return;
            }
            
            const projectId = mockStore.projects[0].id;
            const material = { id: Date.now(), name: 'Beton K-300', qty_plan: 100, qty_terpasang: 0, unit: 'm3' };
            
            if (!mockStore.materials[projectId]) mockStore.materials[projectId] = [];
            mockStore.materials[projectId].push(material);
            
            addActivity({ 
                action: 'Tambah Material', 
                detail: `${material.name} (${material.qty_plan} ${material.unit})`, 
                projectId 
            });
            showResult('Material added');
        }

        function testUpdateMaterial() {
            const projectId = mockStore.projects[0]?.id;
            if (!projectId || !mockStore.materials[projectId]?.length) {
                showResult('No materials to update. Add a material first.');
                return;
            }
            
            const material = mockStore.materials[projectId][0];
            const qtyTambah = 25;
            material.qty_terpasang = Math.min(material.qty_terpasang + qtyTambah, material.qty_plan);
            
            addActivity({ 
                action: 'Update Material Terpasang', 
                detail: `Tambah ${qtyTambah} ${material.unit} ${material.name}`, 
                projectId 
            });
            
            const percentage = (material.qty_terpasang / material.qty_plan) * 100;
            if (percentage >= 100) {
                addNotif({
                    type: 'success',
                    title: 'Material Selesai ✓',
                    message: `${material.name} telah terpasang 100%`,
                    projectId,
                });
            }
            
            showResult(`Material updated: ${Math.round(percentage)}%`);
        }

        function testDeleteMaterial() {
            const projectId = mockStore.projects[0]?.id;
            if (!projectId || !mockStore.materials[projectId]?.length) {
                showResult('No materials to delete. Add a material first.');
                return;
            }
            
            const material = mockStore.materials[projectId][0];
            mockStore.materials[projectId] = mockStore.materials[projectId].filter(m => m.id !== material.id);
            
            addActivity({ 
                action: 'Hapus Material', 
                detail: `${material.name} (${material.qty_plan} ${material.unit}) dihapus`, 
                projectId 
            });
            showResult('Material deleted');
        }

        function testAddDocument() {
            if (mockStore.projects.length === 0) {
                showResult('No projects available. Add a project first.');
                return;
            }
            
            const projectId = mockStore.projects[0].id;
            const doc = { 
                id: Date.now(), 
                name: 'Kontrak Kerja.pdf', 
                type: 'Kontrak', 
                projectId 
            };
            
            mockStore.documents.push(doc);
            
            addActivity({ 
                action: 'Upload Dokumen', 
                detail: `Upload ${doc.type}: ${doc.name}`, 
                projectId 
            });
            
            // Important document notification
            const project = mockStore.projects.find(p => p.id === projectId);
            addNotif({
                type: 'info',
                title: 'Dokumen Penting Diupload',
                message: `${doc.type}: ${doc.name} untuk proyek ${project.name}`,
                projectId,
            });
            
            showResult('Document added');
        }

        function testDeleteDocument() {
            if (mockStore.documents.length === 0) {
                showResult('No documents to delete. Add a document first.');
                return;
            }
            
            const doc = mockStore.documents[0];
            mockStore.documents = mockStore.documents.filter(d => d.id !== doc.id);
            
            addActivity({ 
                action: 'Hapus Dokumen', 
                detail: `Hapus: ${doc.name}`, 
                projectId: doc.projectId 
            });
            showResult('Document deleted');
        }

        function checkNotifications() {
            showResult('Notifications:\n' + JSON.stringify(mockStore.notifications, null, 2));
        }

        function checkActivityLog() {
            showResult('Activity Log:\n' + JSON.stringify(mockStore.activities, null, 2));
        }

        function clearAll() {
            mockStore = {
                projects: [],
                materials: {},
                documents: [],
                notifications: [],
                activities: []
            };
            showResult('All data cleared');
        }

        function showResult(message) {
            document.getElementById('result').innerHTML = '<pre>' + message + '</pre>';
        }
    </script>
</body>
</html>
