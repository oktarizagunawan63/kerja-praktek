<!DOCTYPE html>
<html>
<head>
    <title>Debug User Data</title>
</head>
<body>
    <h1>Debug User Data</h1>
    <button onclick="checkLocalStorage()">Check LocalStorage</button>
    <button onclick="clearStorage()">Clear Storage</button>
    <div id="result"></div>

    <script>
        function checkLocalStorage() {
            const authData = localStorage.getItem('amsar-auth');
            const userData = localStorage.getItem('amsar-users');
            
            document.getElementById('result').innerHTML = `
                <h3>Auth Data:</h3>
                <pre>${authData || 'No auth data'}</pre>
                <h3>User Data:</h3>
                <pre>${userData || 'No user data'}</pre>
            `;
            
            if (authData) {
                try {
                    const parsed = JSON.parse(authData);
                    console.log('Parsed auth data:', parsed);
                    console.log('User role:', parsed.state?.user?.role);
                } catch (e) {
                    console.error('Error parsing auth data:', e);
                }
            }
        }
        
        function clearStorage() {
            localStorage.removeItem('amsar-auth');
            localStorage.removeItem('amsar-users');
            alert('Storage cleared');
        }
        
        // Auto check on load
        checkLocalStorage();
    </script>
</body>
</html>
